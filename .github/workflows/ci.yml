name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: userve_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql
          coverage: none

      - name: Copy env
        run: cp .env.example .env

      - name: Configure app env
        run: |
          echo "APP_KEY=" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=userve_ci" >> .env
          echo "DB_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: PHP syntax check
        run: find app database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Generate app key
        run: php artisan key:generate

      - name: Fresh migrate and seed
        run: php artisan migrate:fresh --seed --force

      - name: Run tests
        run: php artisan test

      - name: Compile Blade views
        run: |
          php artisan view:clear
          php artisan view:cache

      - name: Config sanity
        run: |
          php artisan config:cache
          php artisan config:clear

      - name: Event/listener sanity
        run: php artisan event:list
